<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #video-container {
      width: 100%;
      max-width: 480px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #f57c00;
      position: relative;
      background: #000;
    }
    video {
      width: 100%;
      display: block;
    }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      height: 35%;
      border: 3px solid #f57c00;
      border-radius: 6px;
      pointer-events: none;
    }
    #result {
      margin-top: 24px;
      width: 100%;
      max-width: 480px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      font-size: 1.1rem;
      min-height: 60px;
      text-align: center;
      color: #aaa;
    }
    #result.found {
      color: #4caf50;
      font-weight: 700;
      font-size: 1.3rem;
    }
    #status {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay"></div>
  </div>
  <div id="result">Point camera at a barcode...</div>
  <div id="status">Starting camera...</div>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script>
    var status = document.getElementById('status');
    var result = document.getElementById('result');
    var lastCode = '';
    var lastTime = 0;

    if (typeof ZXing === 'undefined') {
      status.textContent = 'ZXing library failed to load';
    } else {
      status.textContent = 'ZXing loaded — starting camera...';

      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.UPC_A,
        ZXing.BarcodeFormat.UPC_E,
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.ITF
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

      var codeReader = new ZXing.BrowserMultiFormatReader(hints);

      codeReader.listVideoInputDevices().then(function(devices) {
        status.textContent = 'Found ' + devices.length + ' camera(s)';

        // prefer back camera
        var deviceId = devices[0] && devices[0].deviceId;
        for (var i = 0; i < devices.length; i++) {
          if (devices[i].label.toLowerCase().indexOf('back') > -1 ||
              devices[i].label.toLowerCase().indexOf('rear') > -1 ||
              devices[i].label.toLowerCase().indexOf('environment') > -1) {
            deviceId = devices[i].deviceId;
            break;
          }
        }

        codeReader.decodeFromVideoDevice(deviceId, 'video', function(res, err) {
          if (res) {
            var code = res.getText();
            var now = Date.now();
            if (code === lastCode && now - lastTime < 3000) return;
            lastCode = code;
            lastTime = now;
            result.textContent = '✅ ' + code;
            result.className = 'found';
            status.textContent = 'Scanned!';
            // beep
            try {
              var ctx = new (window.AudioContext || window.webkitAudioContext)();
              var osc = ctx.createOscillator();
              var gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.frequency.value = 1800;
              gain.gain.value = 0.3;
              osc.start();
              osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
          }
          if (err && !(err instanceof ZXing.NotFoundException)) {
            status.textContent = 'Error: ' + err;
          }
        });

      }).catch(function(err) {
        status.textContent = 'Camera error: ' + err;
      });
    }
  </script>
</body>
</html>
