<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 {
      font-size: 1.2rem;
      padding-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #scanner-container {
      width: 100%;
      max-width: 480px;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #f57c00;
      max-height: 340px;
    }
    #scanner-container video {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
    }
    #scanner-container canvas.drawingBuffer {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    /* targeting overlay */
    #target {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 75%;
      height: 35%;
      pointer-events: none;
    }

    /* corner brackets */
    #target::before, #target::after,
    #target .corner-br, #target .corner-bl {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: #4caf50;
      border-style: solid;
    }
    #target::before {
      top: 0; left: 0;
      border-width: 3px 0 0 3px;
    }
    #target::after {
      top: 0; right: 0;
      border-width: 3px 3px 0 0;
    }
    #target .corner-br {
      bottom: 0; right: 0;
      border-width: 0 3px 3px 0;
    }
    #target .corner-bl {
      bottom: 0; left: 0;
      border-width: 0 0 3px 3px;
    }

    /* faint barcode watermark using SVG inline */
    #target .barcode-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      opacity: 0.12;
    }

    #result-area {
      width: 100%;
      max-width: 480px;
      margin-top: 20px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    #result-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
    }
    #result-code {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4caf50;
      letter-spacing: 2px;
      min-height: 2rem;
    }
    #result-hint {
      font-size: 0.85rem;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="scanner-container">
    <div id="target">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
      <svg class="barcode-hint" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg" fill="white">
        <rect x="0"  y="0" width="3"  height="80"/>
        <rect x="5"  y="0" width="1"  height="80"/>
        <rect x="8"  y="0" width="4"  height="80"/>
        <rect x="14" y="0" width="2"  height="80"/>
        <rect x="18" y="0" width="3"  height="80"/>
        <rect x="23" y="0" width="1"  height="80"/>
        <rect x="26" y="0" width="5"  height="80"/>
        <rect x="33" y="0" width="2"  height="80"/>
        <rect x="37" y="0" width="3"  height="80"/>
        <rect x="42" y="0" width="1"  height="80"/>
        <rect x="45" y="0" width="4"  height="80"/>
        <rect x="51" y="0" width="2"  height="80"/>
        <rect x="55" y="0" width="3"  height="80"/>
        <rect x="60" y="0" width="1"  height="80"/>
        <rect x="63" y="0" width="5"  height="80"/>
        <rect x="70" y="0" width="2"  height="80"/>
        <rect x="74" y="0" width="3"  height="80"/>
        <rect x="79" y="0" width="1"  height="80"/>
        <rect x="82" y="0" width="4"  height="80"/>
        <rect x="88" y="0" width="2"  height="80"/>
        <rect x="92" y="0" width="3"  height="80"/>
        <rect x="97" y="0" width="1"  height="80"/>
        <rect x="100" y="0" width="5" height="80"/>
        <rect x="107" y="0" width="2" height="80"/>
        <rect x="111" y="0" width="3" height="80"/>
        <rect x="116" y="0" width="1" height="80"/>
        <rect x="119" y="0" width="4" height="80"/>
        <rect x="125" y="0" width="2" height="80"/>
        <rect x="129" y="0" width="3" height="80"/>
        <rect x="134" y="0" width="1" height="80"/>
        <rect x="137" y="0" width="5" height="80"/>
        <rect x="144" y="0" width="2" height="80"/>
        <rect x="148" y="0" width="3" height="80"/>
        <rect x="153" y="0" width="1" height="80"/>
        <rect x="156" y="0" width="4" height="80"/>
        <rect x="162" y="0" width="2" height="80"/>
        <rect x="166" y="0" width="3" height="80"/>
        <rect x="171" y="0" width="1" height="80"/>
        <rect x="174" y="0" width="5" height="80"/>
        <rect x="181" y="0" width="2" height="80"/>
        <rect x="185" y="0" width="3" height="80"/>
        <rect x="190" y="0" width="1" height="80"/>
        <rect x="193" y="0" width="4" height="80"/>
        <rect x="199" y="0" width="2" height="80"/>
        <rect x="203" y="0" width="3" height="80"/>
        <rect x="208" y="0" width="1" height="80"/>
        <rect x="211" y="0" width="5" height="80"/>
        <rect x="218" y="0" width="2" height="80"/>
      </svg>
    </div>
  </div>
  <div id="result-area">
    <div id="result-label">Last Scanned</div>
    <div id="result-code">—</div>
    <div id="result-hint">Point camera at a barcode</div>
  </div>

  <script>
    var resultCode = document.getElementById('result-code');
    var resultHint = document.getElementById('result-hint');
    var lastCode = '';
    var lastTime = 0;

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = 1800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ac.currentTime + 0.15);
      } catch(e) {}
    }

    function onDetected(code) {
      var now = Date.now();
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code;
      lastTime = now;
      beep();
      resultCode.textContent = code;
      resultHint.textContent = 'Scanned — ready for next';
    }

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: document.getElementById('scanner-container'),
        constraints: {
          facingMode: 'environment',
          width: { min: 640, ideal: 1280, max: 1920 },
          height: { min: 480, ideal: 720, max: 1080 }
        },
        area: {
          top: '20%',
          right: '10%',
          left: '10%',
          bottom: '20%'
        }
      },
      locator: {
        patchSize: 'medium',
        halfSample: false
      },
      numOfWorkers: 4,
      frequency: 20,
      decoder: {
        readers: ['ean_reader'],
        debug: {
          drawBoundingBox: true,
          showFrequency: false,
          drawScanline: true,
          showPattern: false
        }
      },
      locate: true
    }, function(err) {
      if (err) {
        resultHint.textContent = 'Error: ' + err;
        return;
      }
      resultHint.textContent = 'Point camera at a barcode';
      Quagga.start();
    });

    Quagga.onDetected(function(result) {
      var code = result.codeResult.code;
      if (code) {
        onDetected(code);
      }
    });
  </script>
</body>
</html>
