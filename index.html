<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 {
      font-size: 1.2rem;
      padding-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #scanner-container {
      width: 100%;
      max-width: 480px;
      height: 260px;
      position: relative;
      background: #000;
      overflow: hidden;
      border-radius: 12px;
      border: 3px solid #f57c00;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    canvas { display: none; }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      height: 40%;
      border: 3px solid #4caf50;
      border-radius: 6px;
      pointer-events: none;
    }
    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }
    #flash.active { opacity: 1; }
    #result-area {
      width: 100%;
      max-width: 480px;
      margin-top: 20px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    #result-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
    }
    #result-code {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4caf50;
      letter-spacing: 2px;
      min-height: 2rem;
    }
    #result-hint {
      font-size: 0.85rem;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="scanner-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="overlay"></div>
    <div id="flash"></div>
  </div>
  <div id="result-area">
    <div id="result-label">Last Scanned</div>
    <div id="result-code">—</div>
    <div id="result-hint">Point camera at a barcode</div>
  </div>

  <script>
    var video = document.getElementById('video');
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var flash = document.getElementById('flash');
    var resultCode = document.getElementById('result-code');
    var resultHint = document.getElementById('result-hint');
    var lastCode = '';
    var lastTime = 0;

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = 1800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ac.currentTime + 0.15);
      } catch(e) {}
    }

    function doFlash() {
      flash.style.transition = 'none';
      flash.classList.add('active');
      setTimeout(function() {
        flash.style.transition = 'opacity 0.15s ease-out';
        flash.classList.remove('active');
      }, 80);
    }

    function onDetected(code) {
      var now = Date.now();
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code;
      lastTime = now;
      beep();
      doFlash();
      resultCode.textContent = code;
      resultHint.textContent = 'Scanned — ready for next';
    }

    if ('BarcodeDetector' in window) {
      var detector = new BarcodeDetector({
        formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'itf']
      });

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      }).then(function(stream) {
        video.srcObject = stream;
        video.play();

        function tick() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            detector.detect(canvas).then(function(barcodes) {
              if (barcodes.length > 0) {
                var best = barcodes[0];
                for (var i = 0; i < barcodes.length; i++) {
                  if (barcodes[i].format === 'ean_13') { best = barcodes[i]; break; }
                }
                onDetected(best.rawValue);
              }
            }).catch(function() {});
          }
          requestAnimationFrame(tick);
        }
        tick();

      }).catch(function(err) {
        resultHint.textContent = 'Camera error: ' + err;
      });

    } else {
      resultHint.textContent = 'BarcodeDetector not supported on this browser.';
    }
  </script>
</body>
</html>
