<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #scanner-container {
      width: 100%;
      max-width: 480px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #f57c00;
      position: relative;
      background: #000;
      min-height: 240px;
    }
    #scanner-container video {
      width: 100%;
      display: block;
    }
    #scanner-container canvas {
      display: none;
    }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      height: 40%;
      border: 3px solid #4caf50;
      border-radius: 6px;
      pointer-events: none;
    }
    #result {
      margin-top: 24px;
      width: 100%;
      max-width: 480px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      font-size: 1.1rem;
      min-height: 60px;
      text-align: center;
      color: #aaa;
    }
    #result.found {
      color: #4caf50;
      font-weight: 700;
      font-size: 1.3rem;
    }
    #status {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      max-width: 480px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="scanner-container">
    <div id="overlay"></div>
  </div>
  <div id="result">Point camera at a barcode...</div>
  <div id="status">Loading...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <script>
    var statusEl = document.getElementById('status');
    var resultEl = document.getElementById('result');
    var lastCode = '';
    var lastTime = 0;

    if (typeof Quagga === 'undefined') {
      statusEl.textContent = 'ERROR: Quagga library not loaded';
    } else {
      statusEl.textContent = 'Quagga loaded — starting camera...';

      Quagga.init({
        inputStream: {
          name: 'Live',
          type: 'LiveStream',
          target: document.getElementById('scanner-container'),
          constraints: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        },
        decoder: {
          readers: ['ean_reader'],
          multiple: false
        },
        locate: false,
        numOfWorkers: 2,
        frequency: 10
      }, function(err) {
        if (err) {
          statusEl.textContent = 'Init error: ' + err;
          return;
        }
        statusEl.textContent = 'Camera ready — scanning...';
        Quagga.start();
      });

      Quagga.onDetected(function(data) {
        var code = data.codeResult.code;
        var now = Date.now();
        if (code === lastCode && now - lastTime < 3000) return;
        lastCode = code;
        lastTime = now;

        resultEl.textContent = '✅ ' + code;
        resultEl.className = 'found';
        statusEl.textContent = 'Scanned successfully!';

        // beep
        try {
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 1800;
          gain.gain.value = 0.3;
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch(e) {}
      });
    }
  </script>
</body>
</html>
