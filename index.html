<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      padding: 20px;
    }
    h1 { color: #f57c00; margin-bottom: 20px; font-size: 1.2rem; }
    .test { background: #2b2b2b; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .test h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .status { font-size: 0.85rem; }
    .ok { color: #4caf50; }
    .fail { color: #c62828; }
    .pending { color: #888; }
  </style>
</head>
<body>
  <h1>📚 Browser Capability Test</h1>

  <div class="test">
    <h2>1. BarcodeDetector (Native)</h2>
    <div class="status" id="s1">Checking...</div>
  </div>

  <div class="test">
    <h2>2. Camera Access</h2>
    <div class="status" id="s2">Checking...</div>
  </div>

  <div class="test">
    <h2>3. Quagga Library</h2>
    <div class="status" id="s3">Loading...</div>
  </div>

  <div class="test">
    <h2>4. html5-qrcode Library</h2>
    <div class="status" id="s4">Loading...</div>
  </div>

  <div class="test">
    <h2>5. Browser Info</h2>
    <div class="status" id="s5">Checking...</div>
  </div>

  <script>
    // 1. BarcodeDetector
    document.getElementById('s1').textContent = ('BarcodeDetector' in window) ? '✅ Supported' : '❌ Not supported';
    document.getElementById('s1').className = 'status ' + (('BarcodeDetector' in window) ? 'ok' : 'fail');

    // 2. Camera
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(function(stream) {
          stream.getTracks().forEach(function(t) { t.stop(); });
          document.getElementById('s2').textContent = '✅ Camera access works';
          document.getElementById('s2').className = 'status ok';
        })
        .catch(function(err) {
          document.getElementById('s2').textContent = '❌ ' + err;
          document.getElementById('s2').className = 'status fail';
        });
    } else {
      document.getElementById('s2').textContent = '❌ getUserMedia not available';
      document.getElementById('s2').className = 'status fail';
    }

    // 3. Quagga
    var q = document.createElement('script');
    q.src = 'https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
    q.onload = function() {
      document.getElementById('s3').textContent = '✅ Loaded successfully';
      document.getElementById('s3').className = 'status ok';
    };
    q.onerror = function() {
      document.getElementById('s3').textContent = '❌ Failed to load';
      document.getElementById('s3').className = 'status fail';
    };
    document.head.appendChild(q);

    // 4. html5-qrcode
    var h = document.createElement('script');
    h.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
    h.onload = function() {
      document.getElementById('s4').textContent = '✅ Loaded successfully';
      document.getElementById('s4').className = 'status ok';
    };
    h.onerror = function() {
      document.getElementById('s4').textContent = '❌ Failed to load';
      document.getElementById('s4').className = 'status fail';
    };
    document.head.appendChild(h);

    // 5. Browser info
    document.getElementById('s5').textContent = navigator.userAgent;
    document.getElementById('s5').className = 'status pending';
  </script>
</body>
</html>
