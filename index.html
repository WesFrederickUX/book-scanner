
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 {
      font-size: 1.2rem;
      padding-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #scanner-container {
      width: 100%;
      max-width: 480px;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #f57c00;
    }
    #scanner-container video {
      width: 100%;
      display: block;
    }
    #scanner-container canvas.drawingBuffer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #result-area {
      width: 100%;
      max-width: 480px;
      margin-top: 20px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    #result-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
    }
    #result-code {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4caf50;
      letter-spacing: 2px;
      min-height: 2rem;
    }
    #result-hint {
      font-size: 0.85rem;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="scanner-container"></div>
  <div id="result-area">
    <div id="result-label">Last Scanned</div>
    <div id="result-code">—</div>
    <div id="result-hint">Point camera at a barcode</div>
  </div>

  <script>
    var resultCode = document.getElementById('result-code');
    var resultHint = document.getElementById('result-hint');
    var lastCode = '';
    var lastTime = 0;

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = 1800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ac.currentTime + 0.15);
      } catch(e) {}
    }

    function onDetected(code) {
      var now = Date.now();
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code;
      lastTime = now;
      beep();
      resultCode.textContent = code;
      resultHint.textContent = 'Scanned — ready for next';
    }

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: document.getElementById('scanner-container'),
        constraints: {
          facingMode: 'environment',
          width: { min: 640, ideal: 1280, max: 1920 },
          height: { min: 480, ideal: 720, max: 1080 }
        },
        area: {
          top: '20%',
          right: '10%',
          left: '10%',
          bottom: '20%'
        }
      },
      locator: {
        patchSize: 'medium',
        halfSample: false
      },
      numOfWorkers: 4,
      frequency: 20,
      decoder: {
        readers: ['ean_reader'],
        debug: {
          drawBoundingBox: true,
          showFrequency: false,
          drawScanline: true,
          showPattern: false
        }
      },
      locate: true
    }, function(err) {
      if (err) {
        resultHint.textContent = 'Error: ' + err;
        return;
      }
      resultHint.textContent = 'Camera ready — point at barcode';
      Quagga.start();
    });

    Quagga.onDetected(function(result) {
      var code = result.codeResult.code;
      var confidence = result.codeResult.decodedCodes
        .filter(function(x) { return x.error !== undefined; })
        .reduce(function(acc, x) { return acc + x.error; }, 0);
      // only accept high confidence reads
      if (confidence < 0.15) {
        onDetected(code);
      }
    });
  </script>
</body>
</html>
