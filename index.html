<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #scanner-container {
      width: 100%;
      max-width: 480px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #f57c00;
      position: relative;
      background: #000;
      min-height: 240px;
    }
    video {
      width: 100%;
      display: block;
    }
    canvas {
      display: none;
    }
    #overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 35%;
      border: 3px solid #4caf50;
      border-radius: 6px;
      pointer-events: none;
    }
    #result {
      margin-top: 24px;
      width: 100%;
      max-width: 480px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      font-size: 1.1rem;
      min-height: 60px;
      text-align: center;
      color: #aaa;
    }
    #result.found {
      color: #4caf50;
      font-weight: 700;
      font-size: 1.3rem;
    }
    #status {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      max-width: 480px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="scanner-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="overlay"></div>
  </div>
  <div id="result">Point camera at a barcode...</div>
  <div id="status">Starting...</div>

  <script>
    var statusEl = document.getElementById('status');
    var resultEl = document.getElementById('result');
    var video = document.getElementById('video');
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var lastCode = '';
    var lastTime = 0;
    var scanning = false;

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = 1800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ac.currentTime + 0.15);
      } catch(e) {}
    }

    function onDetected(code) {
      var now = Date.now();
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code;
      lastTime = now;
      resultEl.textContent = '✅ ' + code;
      resultEl.className = 'found';
      statusEl.textContent = 'Scanned!';
      beep();
    }

    // Try native BarcodeDetector first
    if ('BarcodeDetector' in window) {
      statusEl.textContent = 'Using native BarcodeDetector...';

      var detector = new BarcodeDetector({
        formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39', 'itf']
      });

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      }).then(function(stream) {
        video.srcObject = stream;
        video.play();
        statusEl.textContent = 'Camera ready — scanning...';

        function tick() {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            detector.detect(canvas).then(function(barcodes) {
              if (barcodes.length > 0) {
                // prefer EAN-13
                var best = barcodes[0];
                for (var i = 0; i < barcodes.length; i++) {
                  if (barcodes[i].format === 'ean_13') { best = barcodes[i]; break; }
                }
                onDetected(best.rawValue);
              }
            }).catch(function() {});
          }
          requestAnimationFrame(tick);
        }
        tick();

      }).catch(function(err) {
        statusEl.textContent = 'Camera error: ' + err;
      });

    } else {
      // Fallback to Quagga
      statusEl.textContent = 'Native API not available — loading Quagga...';

      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
      script.onload = function() {
        statusEl.textContent = 'Quagga loaded — starting...';
        Quagga.init({
          inputStream: {
            name: 'Live',
            type: 'LiveStream',
            target: document.getElementById('scanner-container'),
            constraints: { facingMode: 'environment' }
          },
          decoder: {
            readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'code_128_reader'],
            multiple: false
          },
          locate: false,
          numOfWorkers: 2,
          frequency: 10
        }, function(err) {
          if (err) { statusEl.textContent = 'Quagga error: ' + err; return; }
          statusEl.textContent = 'Camera ready — scanning...';
          Quagga.start();
        });
        Quagga.onDetected(function(data) {
          onDetected(data.codeResult.code);
        });
      };
      script.onerror = function() {
        statusEl.textContent = 'All libraries failed to load';
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
