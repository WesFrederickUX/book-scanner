<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 {
      font-size: 1.2rem;
      padding-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f57c00;
    }
    #reader {
      width: 100%;
      max-width: 480px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid #f57c00;
    }
    #result-area {
      width: 100%;
      max-width: 480px;
      margin-top: 20px;
      background: #2b2b2b;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    #result-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 8px;
    }
    #result-code {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4caf50;
      letter-spacing: 2px;
      min-height: 2rem;
    }
    #result-hint {
      font-size: 0.85rem;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>📚 Book Scanner</h1>
  <div id="reader"></div>
  <div id="result-area">
    <div id="result-label">Last Scanned</div>
    <div id="result-code">—</div>
    <div id="result-hint">Point camera at a barcode</div>
  </div>

  <script>
    var resultCode = document.getElementById('result-code');
    var resultHint = document.getElementById('result-hint');
    var lastCode = '';
    var lastTime = 0;

    function beep() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = 1800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ac.currentTime + 0.15);
      } catch(e) {}
    }

    function onDetected(code) {
      var now = Date.now();
      if (code === lastCode && now - lastTime < 3000) return;
      lastCode = code;
      lastTime = now;
      beep();
      resultCode.textContent = code;
      resultHint.textContent = 'Scanned — ready for next';
    }

    var scanner = new Html5Qrcode('reader');

    scanner.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: { width: 280, height: 120 },
        aspectRatio: 1.8,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39
        ]
      },
      function(decodedText) {
        onDetected(decodedText);
      },
      function(error) {
        // silent
      }
    ).catch(function(err) {
      resultHint.textContent = 'Camera error: ' + err;
    });
  </script>
</body>
</html>
